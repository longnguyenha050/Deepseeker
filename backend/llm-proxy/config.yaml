x-google-config: &google_auth 
  api_key: os.environ/GOOGLE_API_KEY     

x-cerebras-config: &cerebras_auth
  api_key: os.environ/CEREBRAS_API_KEY

x-groq-config: &groq_auth
  api_key: os.environ/GROQ_API_KEY

x-deepseek-config: &deepseek_auth
  api_key: os.environ/DEEPSEEK_API_KEY

model_list:
  # Fast models
  - model_name: fast-model
    litellm_params:
      model: deepseek/deepseek-chat
      <<: *deepseek_auth
      api_base: "https://api.deepseek.com/v1"
      stream: true          
      temperature: 0.1      
      top_p: 0.9            
      max_tokens: 500       
      presence_penalty: 0.0 
      frequency_penalty: 0.0
      drop_params: true

  - model_name: best-model
    litellm_params:
      model: groq/meta-llama/llama-4-maverick-17b-128e-instruct
      <<: *groq_auth

  - model_name: best-model
    litellm_params:
      model: groq/openai/gpt-oss-120b
      <<: *groq_auth

  - model_name: mql-model
    litellm_params:
      model: gemini/gemini-2.5-flash
      <<: *google_auth

  - model_name: mql-model
    litellm_params:
      model: gemini/gemini-3-flash-preview
      <<: *google_auth

  - model_name: mql-model
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      <<: *google_auth

litellm_settings:
  drop_params: true
  json_logs: true

router_settings:
  routing_strategy: "simple-shuffle" # Sẽ xoay vòng các model trong cùng một model_name
  num_retries: 3
  timeout: 60
  cooldown_time: 60
